name: CI / Release / Docker

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  ci:
    name: vet / test / build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./...

      - name: Build
        run: go build ./cmd/kopia-browser

  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      patch: ${{ steps.release.outputs.patch }}

    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  docker:
    name: Build & push to GHCR
    runs-on: ubuntu-latest
    needs: [ci, release-please]
    if: needs.release-please.outputs.release_created == 'true'

    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/nicojeske/kopia-browser:${{ needs.release-please.outputs.major }}.${{ needs.release-please.outputs.minor }}.${{ needs.release-please.outputs.patch }}
            ghcr.io/nicojeske/kopia-browser:${{ needs.release-please.outputs.major }}.${{ needs.release-please.outputs.minor }}
            ghcr.io/nicojeske/kopia-browser:${{ needs.release-please.outputs.major }}
            ghcr.io/nicojeske/kopia-browser:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
