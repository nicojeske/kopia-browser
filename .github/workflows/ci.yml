name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: vet / test / build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./...

      - name: Build
        run: go build ./cmd/kopia-browser
